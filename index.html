<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка товара</title>
    <link rel="stylesheet" href="/pr1/css/style.css">
</head>

<body>
    <div class="container">
        <div class="product-card">
            <div class="product-card__image">
                <img src="pr1/images/sneakers.webp" alt="Товар">
            </div>
            <div class="product-card__content">
                <h2 class="product-card__title">Кроссовки Fila</h2>
                <p class="product-card__description">
                    Легкие и комфортные кроссовки для повседневной носки.
                    Технология "zoom" обеспечивает максимальную амортизацию
                    при ходьбе и беге.
                </p>
                <div class="product-card__price">9 990 ₽</div>
                <button class="product-card__button">В корзину</button>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="product-card">
            <div class="product-card__image">
                <img src="pr1/images/nike.png" alt="Товар">
            </div>
            <div class="product-card__content">
                <h2 class="product-card__title">Кроссовки Nike</h2>
                <p class="product-card__description">
                    Удобные кроссовки на каждый день с технологией "zoom" для мягкой амортизации при ходьбе и беге.
                </p>
                <div class="product-card__price">15 000 ₽</div>
                <button class="product-card__button">В корзину</button>
            </div>
        </div>
    </div>
</body>

</html>
